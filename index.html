<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance RDC Pro - Taux & Change</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <link rel="apple-touch-icon" href="icon-app.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1c1e21;
            --primary: #007bff;
            --whatsapp: #25D366;
            --border: #dee2e6;
        }

        [data-theme="dark"] {
            --bg: #18191a;
            --card: #242526;
            --text: #e4e6eb;
            --border: #3e4042;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center; 
        }

        .pub-header { 
            width: 100%; max-width: 728px; height: 90px; 
            margin-bottom: 20px; border-radius: 8px; overflow: hidden;
            background: #e9ecef; border: 1px dashed #adb5bd;
        }
        .pub-header img { width: 100%; height: 100%; object-fit: cover; }

        .container { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.1); 
            width: 100%; max-width: 500px; box-sizing: border-box;
            text-align: center;
        }

        .header-rdc { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .update-date { font-size: 0.8rem; color: #888; margin-bottom: 15px; }

        select, input, button { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid var(--border); background: var(--card); color: var(--text);
            font-size: 1rem; box-sizing: border-box;
        }

        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-wa { 
            background: var(--whatsapp); color: white; text-decoration: none; 
            display: flex; align-items: center; justify-content: center; 
            padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 15px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 0.9rem; }
        th { background: rgba(0,0,0,0.05); }
        .taux-val { font-weight: bold; color: var(--primary); }

        .rating { margin: 15px 0; display: flex; flex-direction: row-reverse; justify-content: center; gap: 5px; }
        .rating input { display: none; }
        .rating label {
            cursor: pointer; width: 30px; height: 30px;
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23ccc" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>');
            background-repeat: no-repeat; background-position: center; background-size: contain;
        }
        .rating input:checked ~ label, .rating label:hover, .rating label:hover ~ label {
            background-image: url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffc107" stroke="%23ffc107" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>');
        }

        .comment-section { margin-top: 25px; padding-top: 15px; border-top: 1px dashed var(--border); text-align: left; }
        #listeDisplay { max-height: 200px; overflow-y: auto; margin-bottom: 10px; background: #f8f9fa; border-radius: 8px; padding: 5px; }
        .comment-item { background: white; padding: 10px; border-radius: 5px; margin-bottom: 8px; border-left: 4px solid var(--primary); font-size: 0.85rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .comment-section textarea { width: 100%; height: 60px; border-radius: 8px; border: 1px solid var(--border); padding: 10px; box-sizing: border-box; resize: none; }
        .btn-comment { background: #6c757d; font-size: 0.85rem; height: 40px; padding: 0; margin-top: 5px; }

        .footer { margin-top: 30px; padding: 20px; text-align: center; font-size: 0.85rem; color: #666; width: 100%; max-width: 500px; }
        .footer a { color: var(--primary); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="pub-header">
        <img src="https://via.placeholder.com/728x90.png?text=Finance+RDC+Pro+-+Taux+Actuel+2300+FC" alt="Publicité">
    </div>

    <div class="container">
        <div class="header-rdc">
            <span style="font-size: 1.8rem;">🇨🇩</span>
            <h2 style="margin: 0;">Finance RDC Pro</h2>
        </div>
        
        <div id="dateUpdate" class="update-date">Mise à jour en cours...</div>

        <div style="text-align: left; margin-bottom: 10px;">
            <label style="font-weight: bold; font-size: 0.9rem;">Sens de conversion</label>
            <select id="direction" onchange="changerLabels()">
                <option value="CDF_USD">Franc Congolais (CDF) ➔ Dollar (USD)</option>
                <option value="USD_CDF">Dollar (USD) ➔ Franc Congolais (CDF)</option>
            </select>
        </div>

        <label id="labelMontant" style="display: block; text-align: left; font-weight: bold; font-size: 0.9rem;">Montant en Francs (CDF)</label>
        <input type="number" id="montant" value="10000" oninput="calculer()">

        <button onclick="calculer()">Calculer maintenant</button>
        
        <a id="shareWA" class="btn-wa" href="#" target="_blank">Partager sur WhatsApp 📱</a>

        <div id="resultat-principal" style="font-size: 1.3rem; font-weight: bold; margin: 15px 0; color: var(--primary); min-height: 1.5em;"></div>

        <table>
            <thead>
                <tr>
                    <th>Banque</th>
                    <th>Taux (1$)</th>
                    <th id="thResultat">Résultat ($)</th>
                </tr>
            </thead>
            <tbody id="tableBanques"></tbody>
        </table>

        <canvas id="monGraphique" style="margin-top: 25px;"></canvas>

        <div style="margin-top: 30px;">
            <h4 style="margin-bottom: 5px;">Notez l'application</h4>
            <div class="rating">
                <input type="radio" id="star5" name="rating" value="5" onclick="recommander(5)"><label for="star5"></label>
                <input type="radio" id="star4" name="rating" value="4" onclick="recommander(4)"><label for="star4"></label>
                <input type="radio" id="star3" name="rating" value="3" onclick="recommander(3)"><label for="star3"></label>
                <input type="radio" id="star2" name="rating" value="2" onclick="recommander(2)"><label for="star2"></label>
                <input type="radio" id="star1" name="rating" value="1" onclick="recommander(1)"><label for="star1"></label>
            </div>
            <p id="rating-text" style="font-size: 0.8rem; height: 15px;"></p>
        </div>

        <div class="comment-section">
            <h4 style="margin: 0 0 10px 0;">Avis des utilisateurs</h4>
            <div id="listeDisplay">Chargement des avis...</div>
            <input type="text" id="userName" placeholder="Ton nom" style="padding: 10px; margin-bottom: 5px; border-radius: 8px; border: 1px solid var(--border); width: 100%; box-sizing: border-box;">
            <textarea id="userComment" placeholder="Un avis ? Une suggestion ?"></textarea>
            <button class="btn-comment" id="btnFirebase">Publier mon avis</button>
        </div>
    </div>

    <div class="footer">
        <p>Développé par <strong>Exaucé Kisiabongo</strong></p>
        <p>Étudiant en L1 Informatique - Université Kongo</p>
        <div style="margin-top: 8px;">
            <a href="https://github.com/Exauce01159" target="_blank">GitHub</a> • 
            <a href="https://www.linkedin.com/in/exauc%C3%A9-kisiabongo-7a08b52a3/" target="_blank">LinkedIn</a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDr7swsZsXBJ72x7FpMXHA6YMN-76H43ZI",
        authDomain: "mon-site-chat.firebaseapp.com",
        projectId: "mon-site-chat",
        storageBucket: "mon-site-chat.firebasestorage.app",
        messagingSenderId: "408362473343",
        appId: "1:408362473343:web:afa7ad876b271e4bf5ec4a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "commentaires");

    document.getElementById('btnFirebase').onclick = async () => {
        const nom = document.getElementById('userName').value || "Anonyme";
        const com = document.getElementById('userComment').value;
        if(!com) return;

        try {
            await addDoc(colRef, { nom: nom, message: com, date: serverTimestamp() });
            document.getElementById('userComment').value = "";
        } catch (e) {
            console.error("Erreur Firebase");
        }
    };

    const q = query(colRef, orderBy("date", "desc"));
    onSnapshot(q, (snapshot) => {
        const display = document.getElementById('listeDisplay');
        display.innerHTML = "";
        snapshot.docs.forEach(doc => {
            const d = doc.data();
            display.innerHTML += `<div class="comment-item"><strong>${d.nom}</strong>: ${d.message}</div>`;
        });
    });
</script>

<script>
    // --- ACTIVATION DU TÉLÉCHARGEMENT (SERVICE WORKER) ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("Service Worker: Enregistré (Installation débloquée)");
            }).catch(err => console.log("Erreur SW", err));
        });
    }

    const tauxBanques = [
        { nom: "Marché Parallèle", taux: 2300 },
        { nom: "Rawbank", taux: 2280 },
        { nom: "Equity BCDC", taux: 2285 },
        { nom: "TMB", taux: 2275 }
    ];

    let graphiqueInstance = null;

    function changerLabels() {
        const direction = document.getElementById('direction').value;
        const labelMontant = document.getElementById('labelMontant');
        const thResultat = document.getElementById('thResultat');
        const montantInput = document.getElementById('montant');

        if (direction === "CDF_USD") {
            labelMontant.innerText = "Montant en Francs (CDF)";
            thResultat.innerText = "Résultat ($)";
            if(montantInput.value == 1) montantInput.value = 10000;
        } else {
            labelMontant.innerText = "Montant en Dollars (USD)";
            thResultat.innerText = "Résultat (FC)";
            if(montantInput.value == 10000) montantInput.value = 1;
        }
        calculer();
    }

    function calculer() {
        const montant = parseFloat(document.getElementById('montant').value);
        const direction = document.getElementById('direction').value;
        const tbody = document.getElementById('tableBanques');
        const resPrincipal = document.getElementById('resultat-principal');
        tbody.innerHTML = ""; 

        if(!montant || montant <= 0) {
            resPrincipal.innerText = "";
            return;
        }

        const tauxRef = tauxBanques[0].taux;
        let totalRef, uniteSource, uniteDest;

        if (direction === "CDF_USD") {
            totalRef = (montant / tauxRef).toFixed(2);
            uniteSource = "CDF"; uniteDest = "USD";
        } else {
            totalRef = Math.round(montant * tauxRef).toLocaleString('fr-FR');
            uniteSource = "USD"; uniteDest = "CDF";
        }

        resPrincipal.innerText = `${montant.toLocaleString('fr-FR')} ${uniteSource} ≈ ${totalRef} ${uniteDest}`;

        tauxBanques.forEach(banque => {
            let conversion;
            if (direction === "CDF_USD") {
                conversion = (montant / banque.taux).toFixed(2) + " $";
            } else {
                conversion = Math.round(montant * banque.taux).toLocaleString('fr-FR') + " FC";
            }
            tbody.innerHTML += `<tr><td>${banque.nom}</td><td class="taux-val">${banque.taux}</td><td>${conversion}</td></tr>`;
        });

        const urlSite = window.location.href;
        const msg = `📊 *Finance RDC Pro*\nConversion : ${resPrincipal.innerText}\nConsultez le taux ici : ${urlSite}`;
        document.getElementById('shareWA').href = `https://wa.me/?text=${encodeURIComponent(msg)}`;

        genererGraphique();
    }

    function genererGraphique() {
        const ctx = document.getElementById('monGraphique').getContext('2d');
        if (graphiqueInstance) graphiqueInstance.destroy();
        graphiqueInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: tauxBanques.map(b => b.nom),
                datasets: [{
                    label: 'Taux (CDF pour 1$)',
                    data: tauxBanques.map(b => b.taux),
                    backgroundColor: ['#dc3545', '#007bff', '#6c757d', '#fd7e14'],
                    borderRadius: 5
                }]
            },
            options: { 
                responsive: true, 
                scales: { y: { beginAtZero: false, min: 1500 } },
                plugins: { legend: { display: false } }
            }
        });
    }

    function afficherDate() {
        const options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('dateUpdate').innerText = "Dernière mise à jour : " + new Date().toLocaleDateString('fr-FR', options);
    }

    function recommander(note) {
        let texte = note >= 4 ? "Génial ! Partagez l'app !" : "Merci pour votre note !";
        document.getElementById('rating-text').innerText = texte;
    }

    window.onload = function() { 
        calculer(); 
        afficherDate(); 
    };
</script>

</body>
</html>
